<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo SERIPM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased">

    <!-- Tela de Login -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-xl w-96 border border-slate-200">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">SERIPM 2026</h2>
            <input type="text" id="user" placeholder="Usuário" class="w-full p-3 mb-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="pass" placeholder="Senha" class="w-full p-3 mb-6 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="fazerLogin()" class="w-full bg-blue-800 text-white p-3 rounded-lg font-bold hover:bg-blue-900 transition">ENTRAR</button>
        </div>
    </div>

    <!-- Dashboard Principal -->
    <div id="dashboard" class="hidden min-h-screen">
        <nav class="bg-slate-900 text-white p-4 shadow-lg">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold">SERIPM | Painel Administrativo</h1>
                <div class="flex items-center gap-4">
                    <span id="display-user" class="text-sm font-medium"></span>
                    <button onclick="logout()" class="text-red-400 hover:text-white transition"><i class="fas fa-sign-out-alt"></i> Sair</button>
                </div>
            </div>
        </nav>
        <main class="container mx-auto p-6">
            <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-semibold mb-4">Bem-vindo ao Sistema</h2>
                <p class="text-slate-600">Selecione uma opção no menu para começar a gerenciar os protocolos.</p>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxNb43bJzS-d5Fz7mtHft3U40Ts86y6POoCPVtMXqKwShOQUXbxBMowjQrFj6jy8BrS/exec";

        // Função de verificação de estado inicial
        window.onload = () => {
            const savedUser = localStorage.getItem('seripm_user');
            if (savedUser) {
                mostrarDashboard(savedUser);
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        };

        async function fazerLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if (!u || !p) return alert("Preencha todos os campos.");

            try {
                // Simulando o sucesso do login para liberar a interface
                localStorage.setItem('seripm_user', u);
                mostrarDashboard(u);
            } catch (e) {
                console.error("Erro no login:", e);
                alert("Erro ao conectar com o servidor.");
            }
        }

        function mostrarDashboard(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('display-user').innerText = user;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
