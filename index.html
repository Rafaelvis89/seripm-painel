<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo SERIPM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased">

    <!-- Tela de Login -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-xl w-96 border border-slate-200">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">SERIPM 2026</h2>
            <input type="text" id="user" placeholder="Usuário" class="w-full p-3 mb-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="pass" placeholder="Senha" class="w-full p-3 mb-6 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="fazerLogin()" class="w-full bg-blue-800 text-white p-3 rounded-lg font-bold hover:bg-blue-900 transition">ENTRAR</button>
        </div>
    </div>

    <!-- Dashboard Principal -->
    <div id="dashboard" class="hidden flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white p-6">
            <h1 class="text-xl font-bold mb-8 border-b border-slate-700 pb-4">SERIPM 2026</h1>
            <nav class="space-y-4">
                <button onclick="trocarAba('home')" class="block w-full text-left hover:text-blue-400 transition"><i class="fas fa-home mr-2"></i> Início</button>
                <button onclick="trocarAba('protocolos')" class="block w-full text-left hover:text-blue-400 transition"><i class="fas fa-list mr-2"></i> Protocolos</button>
                <button onclick="logout()" class="block w-full text-left text-red-400 hover:text-red-300 transition mt-10"><i class="fas fa-sign-out-alt mr-2"></i> Sair</button>
            </nav>
        </aside>

        <!-- Conteúdo -->
        <main class="flex-1 p-8 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <h2 id="tab-title" class="text-2xl font-bold text-slate-800">Bem-vindo</h2>
                <div class="bg-white px-4 py-2 rounded-lg shadow-sm">
                    <span id="display-user" class="font-medium"></span>
                </div>
            </header>

            <div id="content-area" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px]">
                <p>Selecione uma opção no menu lateral para visualizar os dados.</p>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxNb43bJzS-d5Fz7mtHft3U40Ts86y6POoCPVtMXqKwShOQUXbxBMowjQrFj6jy8BrS/exec";

        window.onload = () => {
            const savedUser = localStorage.getItem('seripm_user');
            if (savedUser) {
                mostrarDashboard(savedUser);
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        };

        async function fazerLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (!u || !p) return alert("Preencha todos os campos.");
            localStorage.setItem('seripm_user', u);
            mostrarDashboard(u);
        }

        function mostrarDashboard(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('display-user').innerText = "Olá, " + user;
        }

        function trocarAba(aba) {
            const content = document.getElementById('content-area');
            const title = document.getElementById('tab-title');
            
            if(aba === 'home') {
                title.innerText = "Painel Inicial";
                content.innerHTML = "<p>Bem-vindo ao sistema de gestão da SERIPM.</p>";
            } else if (aba === 'protocolos') {
                title.innerText = "Lista de Protocolos";
                content.innerHTML = "<p>Carregando dados dos protocolos...</p>";
                // Aqui você chamará a função de buscar protocolos da sua API
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
