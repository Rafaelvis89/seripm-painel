<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Protocolos - SERIPM MARICÁ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        @media print { body * { visibility: hidden; } #print-section, #print-section * { visibility: visible; } #print-section { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body class="bg-gray-100 p-6">
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4">Acesso ao Sistema</h2>
        <input type="text" id="username" placeholder="Usuário" class="w-full p-2 border mb-3">
        <input type="password" id="password" placeholder="Senha" class="w-full p-2 border mb-3">
        <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-2 rounded">Entrar</button>
    </div>

    <div id="main-dashboard" class="max-w-6xl mx-auto hidden">
        <h1 class="text-2xl font-bold">Painel de Protocolos</h1>
        <div id="header-username"></div>
        <div id="header-user-role"></div>
        <div id="protocol-list" class="mt-6"></div>
    </div>

    <script>
        // Use a URL oficial do seu GAS
        let GAS_API_URL = "https://script.google.com/macros/s/AKfycbzIfkPMsIzjqU3-qcavlDzR2qrDS_uY2uASMp1LL5v8nRFaxk-0q_mZ7XHOwgANHIZ0/exec";
        
        // Função de envio corrigida para contornar o erro CORS
        async function sendApiRequest(payload) {
            try {
                // A chave aqui é o envio como text/plain para evitar o OPTIONS (preflight)
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(payload)
                });
                
                return await response.json();
            } catch (err) {
                console.error("Erro na comunicação:", err);
                throw err;
            }
        }

        async function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            try {
                const res = await sendApiRequest({ action: 'login', username: u, password: p });
                if (res.code === 200) {
                    localStorage.setItem('sessionToken', res.token);
                    localStorage.setItem('loggedUser', u);
                    location.reload();
                } else {
                    alert("Erro: " + res.error);
                }
            } catch (e) {
                alert("Falha de conexão. Tente novamente.");
            }
        }

        // Carrega o dashboard se houver sessão
        const sessionToken = localStorage.getItem('sessionToken');
        if (sessionToken) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('header-username').textContent = localStorage.getItem('loggedUser');
        }
    </script>
</body>
</html>
