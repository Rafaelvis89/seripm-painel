<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo SERIPM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased">

    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-xl w-96 border border-slate-200">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">SERIPM 2026</h2>
            <input type="text" id="user" placeholder="Utilizador" class="w-full p-3 mb-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="pass" placeholder="Palavra-passe" class="w-full p-3 mb-6 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="fazerLogin()" class="w-full bg-blue-800 text-white p-3 rounded-lg font-bold hover:bg-blue-900 transition">ENTRAR</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-screen">
        <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col h-full">
            <h1 class="text-xl font-bold mb-8 border-b border-slate-700 pb-4">SERIPM 2026</h1>
            <nav id="menu-nav" class="space-y-2 flex-1 overflow-y-auto no-scrollbar">
                <!-- Botões gerados via script -->
            </nav>
            <button onclick="logout()" class="text-red-400 hover:text-red-300 mt-auto pt-4 border-t border-slate-700"><i class="fas fa-sign-out-alt mr-2"></i> Sair</button>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <h2 id="tab-title" class="text-2xl font-bold text-slate-800">Selecione uma aba</h2>
                <span id="display-user" class="bg-white px-4 py-2 rounded-lg shadow-sm font-medium"></span>
            </header>
            
            <!-- ✅ NOVO: Botões de Ação -->
            <div id="action-buttons" class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex gap-3 hidden">
                <button onclick="imprimirProtocolosSelecionados()" class="bg-slate-800 text-white px-5 py-2 rounded-lg hover:bg-slate-900 flex items-center gap-2 font-medium text-sm">
                    <i class="fas fa-print"></i> Imprimir
                </button>
                <button onclick="gerarPDFProtocolosSelecionados()" class="bg-red-600 text-white px-5 py-2 rounded-lg hover:bg-red-700 flex items-center gap-2 font-medium text-sm">
                    <i class="fas fa-file-pdf"></i> Gerar PDF
                </button>
                <button onclick="carregarCardsStatus()" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 flex items-center gap-2 font-medium text-sm ml-auto">
                    <i class="fas fa-sync-alt"></i> Atualizar
                </button>
            </div>
            
            <!-- ✅ NOVO: Cards de Status -->
            <div id="kpi-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 hidden">
                <!-- Preenchido via JS -->
            </div>
            
            <div id="content-area" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] overflow-x-auto">
                <p>Selecione um setor no menu lateral para visualizar os dados.</p>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxNb43bJzS-d5Fz7mtHft3U40Ts86y6POoCPVtMXqKwShOQUXbxBMowjQrFj6jy8BrS/exec";
        const ALL_TABS = ['ENTRADA', 'ADMINISTRATIVO', 'SUPERVISOR', 'COM FUNCIONÁRIO', 'IMPLANTAÇÃO', 'OBRA', 'GARANTIA', 'USUÁRIOS'];
        
        // ✅ NOVO: Variável global para armazenar dados da aba atual
        let currentData = [];

        window.onload = () => {
            const savedUser = localStorage.getItem('seripm_user');
            if (savedUser) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('display-user').innerText = "Utilizador: " + savedUser;
                construirMenu();
            }
        };

        function construirMenu() {
            const nav = document.getElementById('menu-nav');
            ALL_TABS.forEach(aba => {
                const btn = document.createElement('button');
                btn.className = "block w-full text-left p-2 hover:bg-blue-800 rounded transition";
                btn.innerText = aba;
                btn.onclick = () => trocarAba(aba);
                nav.appendChild(btn);
            });
        }

        async function fazerLogin() {
            const u = document.getElementById('user').value;
            localStorage.setItem('seripm_user', u);
            localStorage.setItem('seripm_role', "SUPERVISOR"); 
            location.reload();
        }

        async function trocarAba(aba) {
            document.getElementById('tab-title').innerText = aba;
            const content = document.getElementById('content-area');
            content.innerHTML = `<p class="text-slate-500 animate-pulse">A carregar dados de ${aba}...</p>`;
            
            // ✅ NOVO: Mostrar/ocultar botões de ação (exceto para USUÁRIOS)
            const actionButtons = document.getElementById('action-buttons');
            const kpiContainer = document.getElementById('kpi-container');
            if (aba !== 'USUÁRIOS') {
                actionButtons.classList.remove('hidden');
                kpiContainer.classList.remove('hidden');
            } else {
                actionButtons.classList.add('hidden');
                kpiContainer.classList.add('hidden');
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: aba === 'USUÁRIOS' ? 'getUsers' : 'getProtocols', 
                        tab: aba, 
                        role: localStorage.getItem('seripm_role')
                    })
                });
                
                const result = await response.json();

                if (result.success) {
                    currentData = result.data; // ✅ NOVO: Salvar dados globalmente
                    renderizarTabela(result.data, content);
                    if (aba !== 'USUÁRIOS') {
                        carregarCardsStatus(); // ✅ NOVO: Carregar cards de status
                    }
                } else {
                    content.innerHTML = `<p class="text-red-500">Erro: ${result.error || "Sem dados disponíveis."}</p>`;
                }
            } catch (e) {
                content.innerHTML = `<p class="text-red-500">Erro de conexão. Verifique o servidor.</p>`;
            }
        }

        function renderizarTabela(dados, container) {
            if (!dados || dados.length === 0) { container.innerHTML = "<p>Nenhum registo encontrado nesta aba.</p>"; return; }
            
            const colunasExibidas = ['DATA', 'PROTOCOLO', 'ATENDENTE', 'SOLICITANTE', 'BAIRRO'];
            let html = `<table class="w-full text-sm text-left border-collapse"><thead class="bg-slate-800 text-white"><tr>`;
            
            // ✅ NOVO: Coluna de checkbox
            html += `<th class="px-4 py-2 border w-10"><input type="checkbox" id="select-all-protocols" onchange="toggleSelectAllProtocols()" class="w-4 h-4 cursor-pointer"></th>`;
            
            colunasExibidas.forEach(k => html += `<th class="px-4 py-2 border">${k}</th>`);
            html += `<th class="px-4 py-2 border text-center">Status</th>`;
            html += `<th class="px-4 py-2 border text-right">Ações</th>`;
            html += `</tr></thead><tbody>`;
            
            dados.forEach((row, index) => {
                html += `<tr class="border-b hover:bg-slate-50">`;
                
                // ✅ NOVO: Checkbox para cada protocolo
                html += `<td class="px-4 py-2 border"><input type="checkbox" class="protocol-checkbox" data-index="${index}" data-protocol="${row.PROTOCOLO || ''}" onchange="atualizarContadorSelecionados()" class="w-4 h-4 cursor-pointer"></td>`;
                
                colunasExibidas.forEach(k => {
                    let valor = row[k] || '-';
                    let coluna = Object.keys(row).find(col => col.toUpperCase() === k);
                    if (coluna) valor = row[coluna] || '-';
                    html += `<td class="px-4 py-2 border">${valor}</td>`;
                });
                
                // Status
                let status = row['STATUS'] || '-';
                html += `<td class="px-4 py-2 border text-center">${status}</td>`;
                
                // Botão Detalhes
                html += `<td class="px-4 py-2 border text-right"><button class="text-blue-600 hover:text-blue-800 text-sm" onclick="alert('Detalhes de: ' + '${row.PROTOCOLO}')">Detalhes</button></td>`;
                html += `</tr>`;
            });
            
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // ✅ NOVO: Gerenciar checkboxes
        function toggleSelectAllProtocols() {
            const selectAllCheckbox = document.getElementById('select-all-protocols');
            const checkboxes = document.querySelectorAll('.protocol-checkbox');
            checkboxes.forEach(cb => cb.checked = selectAllCheckbox.checked);
            atualizarContadorSelecionados();
        }

        function atualizarContadorSelecionados() {
            const selecionados = document.querySelectorAll('.protocol-checkbox:checked').length;
            const allCheckboxes = document.querySelectorAll('.protocol-checkbox').length;
            console.log(`${selecionados} protocolos selecionados de ${allCheckboxes}`);
        }

        // ✅ NOVO: Imprimir com cabeçalho oficial
        function imprimirProtocolosSelecionados() {
            const selecionados = document.querySelectorAll('.protocol-checkbox:checked');
            if (selecionados.length === 0) {
                alert('Selecione ao menos um protocolo para imprimir.');
                return;
            }
            
            let html = '<html><head><meta charset="UTF-8"><title>Protocolos - SERIPM</title><style>';
            html += 'body { font-family: Arial, sans-serif; margin: 20px; }';
            html += '.header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; }';
            html += '.header-logo { width: 80px; }';
            html += '.header-center { flex: 1; text-align: center; }';
            html += '.header-center h2 { margin: 0; font-size: 14px; font-weight: bold; }';
            html += '.header-center p { margin: 2px 0; font-size: 12px; }';
            html += 'table { width: 100%; border-collapse: collapse; margin-top: 20px; }';
            html += 'th, td { border: 1px solid #333; padding: 8px; text-align: left; font-size: 11px; }';
            html += 'th { background-color: #f0f0f0; font-weight: bold; }';
            html += '</style></head><body>';
            
            html += '<div class="header">';
            html += '<div class="header-logo"><img src="https://secretariadenergiasrenovaveis-web.github.io/seripm-painel/images/brasao-marica.png" style="width: 100%; height: auto;"></div>';
            html += '<div class="header-center">';
            html += '<h2>ESTADO DO RIO DE JANEIRO</h2>';
            html += '<p>PREFEITURA MUNICIPAL DE MARICÁ</p>';
            html += '<p>SECRETARIA DE ENERGIAS RENOVÁVEIS E ILUMINAÇÃO PÚBLICA</p>';
            html += '</div>';
            html += '<div class="header-logo"><img src="https://secretariadenergiasrenovaveis-web.github.io/seripm-painel/images/sec.energ.renov.ilum.publica-marica.png" style="width: 100%; height: auto;"></div>';
            html += '</div>';
            
            html += '<h3 style="text-align: center;">PROTOCOLOS SERIPM</h3>';
            html += '<table>';
            html += '<tr><th>Data</th><th>Protocolo</th><th>Atendente</th><th>Solicitante</th><th>Bairro</th><th>Status</th></tr>';
            
            selecionados.forEach(checkbox => {
                const index = parseInt(checkbox.getAttribute('data-index'));
                const row = currentData[index];
                if (row) {
                    html += '<tr>';
                    html += '<td>' + (row.DATA || '') + '</td>';
                    html += '<td>' + (row.PROTOCOLO || '') + '</td>';
                    html += '<td>' + (row.ATENDENTE || '') + '</td>';
                    html += '<td>' + (row.SOLICITANTE || '') + '</td>';
                    html += '<td>' + (row.BAIRRO || '') + '</td>';
                    html += '<td>' + (row.STATUS || '') + '</td>';
                    html += '</tr>';
                }
            });
            
            html += '</table>';
            html += '<p style="margin-top: 30px; text-align: center; font-size: 10px;">Documento gerado em: ' + new Date().toLocaleString('pt-BR') + '</p>';
            html += '</body></html>';
            
            const printWindow = window.open('', '', 'width=900,height=600');
            printWindow.document.write(html);
            printWindow.document.close();
            printWindow.focus();
            setTimeout(() => printWindow.print(), 500);
        }

        // ✅ NOVO: Gerar PDF
        function gerarPDFProtocolosSelecionados() {
            const selecionados = document.querySelectorAll('.protocol-checkbox:checked');
            if (selecionados.length === 0) {
                alert('Selecione ao menos um protocolo para gerar PDF.');
                return;
            }
            imprimirProtocolosSelecionados(); // Usa a mesma função de impressão
        }

        // ✅ NOVO: Carregar cards de status
        async function carregarCardsStatus() {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'getStatusCounts',
                        role: localStorage.getItem('seripm_role'),
                        username: localStorage.getItem('seripm_user')
                    })
                });
                
                const result = await response.json();
                
                if (result.success && result.counts) {
                    const counts = result.counts;
                    const container = document.getElementById('kpi-container');
                    
                    container.innerHTML = `
                        <div class="bg-white rounded-lg shadow-md p-4 border-l-4 border-l-slate-600">
                            <p class="text-xs text-slate-500 uppercase tracking-wider mb-2">Total</p>
                            <p class="text-3xl font-bold text-slate-800">${counts.TOTAL || 0}</p>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-4 border-l-4 border-l-amber-500">
                            <p class="text-xs text-slate-500 uppercase tracking-wider mb-2">Abertos</p>
                            <p class="text-3xl font-bold text-amber-700">${counts.ABERTO || 0}</p>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-4 border-l-4 border-l-red-500">
                            <p class="text-xs text-slate-500 uppercase tracking-wider mb-2">Atrasados (15+ dias)</p>
                            <p class="text-3xl font-bold text-red-700">${counts.ATRASADO || 0}</p>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-4 border-l-4 border-l-blue-500">
                            <p class="text-xs text-slate-500 uppercase tracking-wider mb-2">Com a Empresa</p>
                            <p class="text-3xl font-bold text-blue-700">${counts["COM EMPRESA"] || 0}</p>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-4 border-l-4 border-l-emerald-500">
                            <p class="text-xs text-slate-500 uppercase tracking-wider mb-2">Resolvidos</p>
                            <p class="text-3xl font-bold text-emerald-700">${counts.RESOLVIDO || 0}</p>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-4 border-l-4 border-l-slate-400">
                            <p class="text-xs text-slate-500 uppercase tracking-wider mb-2">Cancelados</p>
                            <p class="text-3xl font-bold text-slate-700">${counts.CANCELADO || 0}</p>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-4 border-l-4 border-l-violet-500">
                            <p class="text-xs text-slate-500 uppercase tracking-wider mb-2">Pendentes</p>
                            <p class="text-3xl font-bold text-violet-700">${counts.PENDENTE || 0}</p>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-4 border-l-4 border-l-pink-500">
                            <p class="text-xs text-slate-500 uppercase tracking-wider mb-2">Garantia</p>
                            <p class="text-3xl font-bold text-pink-700">${counts.GARANTIA || 0}</p>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('Erro ao carregar cards de status:', e);
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
