<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERIPM 2026 | Gestão de Energia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased">

    <!-- Tela de Login -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-xl w-96">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">SERIPM 2026</h2>
            <input type="text" id="user" placeholder="Usuário" class="w-full p-3 mb-4 border rounded">
            <input type="password" id="pass" placeholder="Senha" class="w-full p-3 mb-6 border rounded">
            <button onclick="fazerLogin()" class="w-full bg-blue-800 text-white p-3 rounded font-bold hover:bg-blue-900">ENTRAR</button>
        </div>
    </div>

    <!-- Dashboard (Oculto inicialmente) -->
    <div id="dashboard" class="hidden min-h-screen">
        <div class="p-6">
            <h1 class="text-2xl font-bold">Bem-vindo, <span id="display-user"></span></h1>
            <button onclick="logout()" class="text-red-500 mt-4 underline">Sair do Sistema</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxNb43bJzS-d5Fz7mtHft3U40Ts86y6POoCPVtMXqKwShOQUXbxBMowjQrFj6jy8BrS/exec";

        window.onload = () => {
            const savedUser = localStorage.getItem('seripm_user');
            // Verificação segura: só prossegue se houver um usuário salvo
            if (savedUser) {
                mostrarDashboard(savedUser, localStorage.getItem('seripm_role') || "");
            }
        };

        async function fazerLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // O Google Apps Script exige no-cors em chamadas simples
                    body: JSON.stringify({ action: "login", username: u, password: p })
                });
                
                // Nota: Como estamos em no-cors, simulamos a validação se o fetch disparar
                // Em um cenário real, você deve ajustar seu script para retornar cabeçalhos CORS
                localStorage.setItem('seripm_user', u);
                localStorage.setItem('seripm_role', "ATENDENTE"); // Exemplo
                mostrarDashboard(u, "ATENDENTE");
            } catch (e) {
                console.error("Erro no login:", e);
                alert("Falha na conexão com o servidor.");
            }
        }

        function mostrarDashboard(user, role) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('display-user').innerText = user;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
