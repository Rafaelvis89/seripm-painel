<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel SERIPM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
            <h1 class="text-xl font-black text-center mb-6">LOGIN SERIPM</h1>
            <form id="login-form" class="space-y-4">
                <input type="text" id="user" placeholder="Usuário" class="w-full border rounded-xl p-3">
                <input type="password" id="pass" placeholder="Senha" class="w-full border rounded-xl p-3">
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">ENTRAR</button>
            </form>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white p-4 shadow-sm flex justify-between items-center">
            <div id="tab-menu" class="flex gap-2"></div>
            <button onclick="logout()" class="text-red-500 font-bold text-sm">SAIR</button>
        </nav>
        <main id="main-content" class="p-6">
            <table class="w-full bg-white rounded-xl shadow overflow-hidden">
                <thead class="bg-slate-50 text-[10px] uppercase">
                    <tr><th class="p-3">Data</th><th class="p-3">Protocolo</th><th class="p-3">Solicitante</th><th class="p-3">Status</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </main>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbypRWWMMAI8QC_jWHHAw-B1xklBIY9deSazulRC_rkZM3u65RiHMpQl6yG0xAXm8hQx/exec";
        
        async function fetchAPI(payload) {
            payload.username = localStorage.getItem('seripm_user');
            payload.role = localStorage.getItem('seripm_role');
            payload.allowedTabs = localStorage.getItem('seripm_allowedTabs');
            const res = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
            return await res.json();
        }

        function renderMenu() {
            const menu = document.getElementById('tab-menu');
            const role = localStorage.getItem('seripm_role');
            const allowed = localStorage.getItem('seripm_allowedTabs').split(',');
            
            const abas = ["ENTRADA", "ADMINISTRATIVO", "SUPERVISOR COM FUNCIONÁRIO", "IMPLANTAÇÃO", "GARANTIA", "RELATÓRIO ESTATÍSTICO"];
            
            abas.forEach(aba => {
                if (role === "SUPERVISOR" || allowed.includes(aba)) {
                    menu.innerHTML += `<button onclick="carregarAba('${aba}')" class="px-4 py-2 bg-blue-100 rounded-lg text-xs font-bold">${aba}</button>`;
                }
            });
        }

        async function carregarAba(aba) {
            const res = await fetchAPI({ action: "getProtocols", tab: aba });
            if (res.success) {
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = res.data.map(item => `
                    <tr class="border-b text-xs text-center">
                        <td class="p-3">${item.dataHora}</td>
                        <td class="p-3">${item.protocolo}</td>
                        <td class="p-3">${item.solicitante}</td>
                        <td class="p-3">${item.status}</td>
                    </tr>
                `).join('');
            }
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetchAPI({ action: "login", username: document.getElementById('user').value, password: document.getElementById('pass').value });
            if (res.success) {
                localStorage.setItem('seripm_user', res.username);
                localStorage.setItem('seripm_role', res.role);
                localStorage.setItem('seripm_allowedTabs', res.allowedTabs);
                location.reload();
            } else alert(res.error);
        };

        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if (localStorage.getItem('seripm_user')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                renderMenu();
            }
        };
    </script>
</body>
</html>
